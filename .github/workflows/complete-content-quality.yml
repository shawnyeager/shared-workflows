name: Complete Content Quality Check

on:
  workflow_call:
    inputs:
      site_type:
        description: 'Site type: essays or notes'
        required: true
        type: string
      base_url:
        description: 'Base URL for resolving root-relative links (e.g., https://example.com)'
        required: false
        type: string
        default: ''

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout shared scripts
        uses: actions/checkout@v4
        with:
          repository: shawnyeager/shared-workflows
          path: .shared-workflows

      # --- Link Check ---
      - name: Check links in markdown files
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --timeout 30 --max-retries 5 --accept '200..=299,301,302,307,308,403,429,503' --exclude 'pocketcasts\.com' --exclude 'signal\.me' --exclude 'shawnyeager\.com/signal' ${{ inputs.base_url != '' && format('--base {0}', inputs.base_url) || '' }} 'content/**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check shortcode internal URLs
        run: .shared-workflows/scripts/check-shortcode-urls.sh

      # --- Markdown Lint ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Check for Obsidian wikilinks
        env:
          CONTENT_PATH: ${{ inputs.site_type == 'essays' && 'content/essays/' || 'content/notes/' }}
        run: |
          if grep -rn --include="*.md" '\[\[.*\]\]' "$CONTENT_PATH"; then
            echo "::error::Found Obsidian wikilinks. Convert to standard markdown links."
            exit 1
          fi

      - name: Check for hardcoded smart punctuation
        env:
          CONTENT_PATH: ${{ inputs.site_type == 'essays' && 'content/essays/' || 'content/notes/' }}
        run: .shared-workflows/scripts/check-smart-punctuation.sh "$CONTENT_PATH"

      - name: Lint markdown files
        run: markdownlint-cli2 "**/*.md" "#node_modules" "#public" "#lychee" "#docs" "#CLAUDE.md" "#README.md" "#.shared-workflows"

      # --- Content Validator ---
      - name: Validate frontmatter
        env:
          CONTENT_PATH: ${{ inputs.site_type == 'essays' && 'content/essays' || 'content/notes' }}
          REQUIRE_DESC: ${{ inputs.site_type == 'essays' && 'true' || 'false' }}
        run: .shared-workflows/scripts/validate-frontmatter.sh "$CONTENT_PATH" "$REQUIRE_DESC"

      # --- Module Validator ---
      - name: Validate Hugo module
        run: |
          if [ ! -f go.mod ]; then
            echo "::error::go.mod not found"
            exit 1
          fi
          if ! grep -q "require github.com/shawnyeager/tangerine-theme" go.mod; then
            echo "::error::go.mod missing theme requirement"
            exit 1
          fi

      # --- Image Validator ---
      - name: Validate image alt text
        run: .shared-workflows/scripts/validate-images.sh
